services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.run
    environment:
      BASE_URL: https://url-shortener.thang-dev.xyz
      GIN_MODE: release
    volumes:
      - data:/data          # persists urls.db across restarts
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data    # stores the Let's Encrypt cert
    restart: unless-stopped

volumes:
  data:
  caddy_data:
